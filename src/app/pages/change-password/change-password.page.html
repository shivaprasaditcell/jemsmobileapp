<ion-header>
  <ion-toolbar>
    <ion-title>Change Password</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="password-card">
    <h2>Reset your password</h2>
    <p>Enter your current password and choose a new one.</p>

    <form [formGroup]="form" (ngSubmit)="changePassword()">
      <ion-item class="field-item">
        <ion-label position="stacked">Current Password</ion-label>
        <ion-input
          formControlName="currentPassword"
          [type]="showCurrentPassword ? 'text' : 'password'"
          autocomplete="current-password">
        </ion-input>
        <ion-button fill="clear" slot="end" type="button" (click)="showCurrentPassword = !showCurrentPassword">
          <ion-icon [name]="showCurrentPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
        </ion-button>
      </ion-item>

      <ion-item class="field-item">
        <ion-label position="stacked">New Password</ion-label>
        <ion-input
          formControlName="newPassword"
          [type]="showNewPassword ? 'text' : 'password'"
          autocomplete="new-password">
        </ion-input>
        <ion-button fill="clear" slot="end" type="button" (click)="showNewPassword = !showNewPassword">
          <ion-icon [name]="showNewPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
        </ion-button>
      </ion-item>

      <ion-item class="field-item">
        <ion-label position="stacked">Confirm New Password</ion-label>
        <ion-input
          formControlName="confirmPassword"
          [type]="showConfirmPassword ? 'text' : 'password'"
          autocomplete="new-password">
        </ion-input>
        <ion-button fill="clear" slot="end" type="button" (click)="showConfirmPassword = !showConfirmPassword">
          <ion-icon [name]="showConfirmPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
        </ion-button>
      </ion-item>

      <ion-note color="danger" *ngIf="form.hasError('passwordMismatch') && (confirmPassword?.touched || form.touched)">
        New password and confirm password do not match.
      </ion-note>
      <ion-note color="danger" *ngIf="form.hasError('sameAsCurrent') && (newPassword?.touched || form.touched)">
        New password must be different from current password.
      </ion-note>

      <ion-button expand="block" type="submit" [disabled]="form.invalid || isSubmitting" class="submit-btn">
        <ion-spinner *ngIf="isSubmitting" name="crescent"></ion-spinner>
        <span *ngIf="!isSubmitting">Update Password</span>
      </ion-button>
    </form>
  </div>
</ion-content>
