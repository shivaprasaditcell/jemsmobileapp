<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start"><ion-menu-button></ion-menu-button></ion-buttons>
    <ion-title>Fees</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="student-page-content ion-padding">
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="student-empty" *ngIf="!loading && error">
    <ion-icon name="cloud-offline-outline"></ion-icon>
    <h3>Unable to load fees</h3>
    <p>{{ error }}</p>
  </div>

  <div class="student-skeleton" *ngIf="loading">
    <ion-skeleton-text animated style="width:100%;height:120px;border-radius:24px"></ion-skeleton-text>
  </div>

  <div class="student-empty" *ngIf="!loading && !error && fees.length === 0">
    <ion-icon name="checkmark-circle-outline"></ion-icon>
    <h3>No fee records</h3>
    <p>The fee API returned no rows for this student.</p>
  </div>

  <div class="fee-list" *ngIf="!loading && fees.length > 0">
    <section class="fee-card" *ngFor="let fee of fees">
      <div class="fee-row" *ngFor="let key of objectKeys(fee)">
        <span>{{ key }}</span>
        <strong>{{ fee[key] || 'N/A' }}</strong>
      </div>
    </section>
  </div>
</ion-content>
