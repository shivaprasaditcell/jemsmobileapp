<ion-app>

  <ion-menu contentId="main-content" type="overlay">

    <!-- ── Profile Header ──────────────────────────── -->
    <div class="menu-header">
      <ion-button fill="clear" class="settings-btn" (click)="openQuickAccess()" aria-label="Open quick access">
        <ion-icon name="settings-outline"></ion-icon>
      </ion-button>

      <div class="menu-avatar-wrap">
        <img
          *ngIf="user?.profilePic && !imgError"
          [src]="user!.profilePic"
          class="menu-avatar-img"
          (error)="onImgError()"
          alt="profile" />
        <div *ngIf="!user?.profilePic || imgError" class="menu-avatar-initials">
          {{ initials }}
        </div>
      </div>
      <p class="menu-salutation">{{ user?.salutation }}</p>
      <h2 class="menu-name">{{ user?.firstName }} {{ user?.middleName }} {{ user?.lastName }}</h2>
      <p class="menu-role">{{ user?.designation || user?.role || '' }}</p>
      <p class="menu-dept" *ngIf="user?.departmentName">{{ user!.departmentName }}</p>
    </div>

    <!-- ── Nav Items ───────────────────────────────── -->
    <ion-content class="menu-body">
      <ion-list lines="none" class="menu-list">

        <ion-item button (click)="navigate('/tabs/home')" class="menu-item"
          routerLink="/tabs/home" routerLinkActive="active-item">
          <ion-icon name="home-outline" slot="start"></ion-icon>
          <ion-label>Home</ion-label>
        </ion-item>

        <ion-item button (click)="navigate('/tabs/timetable')" class="menu-item"
          routerLink="/tabs/timetable" routerLinkActive="active-item">
          <ion-icon name="calendar-outline" slot="start"></ion-icon>
          <ion-label>Timetable</ion-label>
        </ion-item>

        <ion-item button (click)="navigate('/tabs/events')" class="menu-item"
          routerLink="/tabs/events" routerLinkActive="active-item">
          <ion-icon name="megaphone-outline" slot="start"></ion-icon>
          <ion-label>Events</ion-label>
        </ion-item>

        <ion-item button (click)="navigate('/tabs/dept-master')" class="menu-item"
          routerLink="/tabs/dept-master" routerLinkActive="active-item">
          <ion-icon name="people-outline" slot="start"></ion-icon>
          <ion-label>Department Master</ion-label>
        </ion-item>

        <ion-item button (click)="navigate('/tabs/hrms')" class="menu-item"
          routerLink="/tabs/hrms" routerLinkActive="active-item">
          <ion-icon name="finger-print-outline" slot="start"></ion-icon>
          <ion-label>HRMS</ion-label>
        </ion-item>

        <ion-item button (click)="navigate('/tabs/helpdesk')" class="menu-item"
          routerLink="/tabs/helpdesk" routerLinkActive="active-item">
          <ion-icon name="ticket-outline" slot="start"></ion-icon>
          <ion-label>My Tickets</ion-label>
        </ion-item>

        <ion-item button (click)="navigate('/tabs/workload')" class="menu-item"
          routerLink="/tabs/workload" routerLinkActive="active-item">
          <ion-icon name="bar-chart-outline" slot="start"></ion-icon>
          <ion-label>Workload</ion-label>
        </ion-item>

      </ion-list>
    </ion-content>

    <!-- ── Sign Out ────────────────────────────────── -->
    <div class="menu-footer">
      <button class="signout-btn" (click)="logout()">
        <ion-icon name="power-outline"></ion-icon>
        Sign Out
      </button>
    </div>

  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>

</ion-app>
