<ion-tabs>

  <!-- Student bottom tabs -->
  <ion-tab-bar slot="bottom" *ngIf="isStudent">

    <ion-tab-button tab="home">
      <ion-icon name="home-outline"></ion-icon>
      <ion-label>Home</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="student-timetable">
      <ion-icon name="calendar-outline"></ion-icon>
      <ion-label>Timetable</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="student-attendance">
      <ion-icon name="checkmark-circle-outline"></ion-icon>
      <ion-label>Attendance</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="student-fees">
      <ion-icon name="card-outline"></ion-icon>
      <ion-label>Fee</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="events">
      <ion-icon name="megaphone-outline"></ion-icon>
      <ion-label>Events</ion-label>
    </ion-tab-button>

  </ion-tab-bar>

  <!-- Staff / Admin bottom tabs -->
  <ion-tab-bar slot="bottom" *ngIf="!isStudent">

    <ion-tab-button tab="home">
      <ion-icon name="home-outline"></ion-icon>
      <ion-label>Home</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="timetable">
      <ion-icon name="calendar-outline"></ion-icon>
      <ion-label>Timetable</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="events">
      <ion-icon name="megaphone-outline"></ion-icon>
      <ion-label>Events</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="hrms">
      <ion-icon name="finger-print-outline"></ion-icon>
      <ion-label>HRMS</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="helpdesk">
      <ion-icon name="ticket-outline"></ion-icon>
      <ion-label>Help Desk</ion-label>
    </ion-tab-button>

  </ion-tab-bar>

</ion-tabs>
